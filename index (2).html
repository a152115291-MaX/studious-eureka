<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقعي المتطور</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f0f8ff; padding: 40px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        input { display: block; margin: 10px auto; padding: 12px; width: 250px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #00aaff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0088cc; }
    </style>
</head>
<body>
    <div class="box">
        <h1>نظام تسجيل الدخول</h1>
        
        <h3>إنشاء حساب جديد</h3>
        <input id="ruser" placeholder="اسم المستخدم">
        <input id="rpass" placeholder="كلمة المرور" type="password">
        <button onclick="auth('register')">تسجيل (Register)</button>

        <hr>

        <h3>دخول المستخدمين</h3>
        <input id="luser" placeholder="اسم المستخدم">
        <input id="lpass" placeholder="كلمة المرور" type="password">
        <button onclick="auth('login')">دخول (Login)</button>
    </div>

    <script>
        // ملاحظة: بعد رفع المشروع لـ Render، استبدل localhost برابط السيرفر الجديد
        const API_URL = 'http://localhost:3000';

        async function auth(type) {
            const user = document.getElementById(type === 'register' ? 'ruser' : 'luser').value;
            const pass = document.getElementById(type === 'register' ? 'rpass' : 'lpass').value;

            try {
                const res = await fetch(`${API_URL}/${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                alert(data.message || (data.success ? 'تمت العملية بنجاح!' : 'حدث خطأ'));
            } catch (err) {
                alert('السيرفر غير متصل حالياً!');
            }
        }
    </script>
</body>
</html>
<link rel="stylesheet" href="style.css">
